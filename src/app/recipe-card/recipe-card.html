<div class="recipe-card" [class.is-favourite]="recipe.isFavourite">
  <!-- Category Badge -->
  <div class="category-badge">
    <span class="category-label">{{ recipe.category }}</span>
  </div>

  <!-- Card Image -->
  <div class="card-image-wrapper">
    <img
      *ngIf="!imgError"
      [src]="`/Foods/${recipe.image}`"
      [alt]="recipe.name"
      class="card-image"
      (error)="onImgError()"
    />
    <div *ngIf="imgError" class="image-placeholder">
      <span class="placeholder-icon">🍽️</span>
    </div>

    <!-- Favourite Button overlaid on image -->
    <button
      class="favourite-btn"
      [class.active]="recipe.isFavourite"
      (click)="toggleFavourite(recipe)"
      [attr.aria-label]="recipe.isFavourite ? 'ritesRemove from favou' : 'Add to favourites'"
    >
      <svg class="heart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        />
      </svg>
    </button>
  </div>

  <!-- Card Body -->
  <div class="card-body">
    <!-- Rating -->
    <div class="rating-row" *ngIf="recipe.rating !== undefined">
      <div class="stars">
        <span *ngFor="let star of starsArray" class="star" [class.filled]="star <= recipe.rating!"
          >★</span
        >
      </div>
      <span class="rating-value">{{ recipe.rating | number: '1.1-1' }}</span>
    </div>

    <!-- Name -->
    <h3 class="recipe-name">{{ recipe.name }}</h3>

    <!-- Short Description -->
    <p class="recipe-description" *ngIf="recipe.description">
      {{ recipe.description | slice: 0 : 90 }}{{ recipe.description!.length > 90 ? '…' : '' }}
    </p>

    <!-- Meta Row: prep time + servings -->
    <div class="meta-row">
      <div class="meta-item">
        <!-- Clock Icon -->
        <svg class="meta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8" fill="none" />
          <polyline
            points="12 6 12 12 16 14"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
        <span class="meta-text">{{ recipe.prepareTime }} min</span>
      </div>

      <div class="meta-item" *ngIf="recipe.serving">
        <!-- Serving Icon -->
        <svg class="meta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M17 9V7a5 5 0 0 0-10 0v2"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            fill="none"
          />
          <path
            d="M3 9h18v2a9 9 0 0 1-9 9 9 9 0 0 1-9-9V9z"
            stroke="currentColor"
            stroke-width="1.8"
            fill="none"
          />
        </svg>
        <span class="meta-text">{{ recipe.serving }} servings</span>
      </div>
    </div>

    <!-- Ingredients Preview -->
    <div class="ingredients-preview">
      <span *ngFor="let ingredient of recipe.ingredients | slice: 0 : 4" class="ingredient-chip">{{
        ingredient
      }}</span>
      <span class="ingredient-chip more" *ngIf="recipe.ingredients.length > 4">
        +{{ recipe.ingredients.length - 4 }} more
      </span>
    </div>
  </div>
</div>
